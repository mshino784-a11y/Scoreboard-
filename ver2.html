<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卓球スコアボード</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e03535;
            --blue: #1a56db;
            --ink: #111827;
            --soft: #6b7280;
            --line: #e5e7eb;
            --bg: #f9fafb;
            --white: #ffffff;
            --cell-w: 160px;
            --cell-h: auto;
            --header-w: 90px;
            --input-w: 38px;
        }
        @media (max-width: 768px) {
            :root { --cell-w: 120px; --header-w: 70px; --input-w: 30px; }
        }
        @media (max-width: 480px) {
            :root { --cell-w: 100px; --header-w: 60px; --input-w: 26px; }
            .top-bar button { padding: 8px 10px !important; font-size: 11px !important; }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Zen Kaku Gothic New', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

        /* ===== TOP BAR ===== */
        .top-bar {
            background: var(--ink);
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .top-bar h1 { font-size: 15px; font-weight: 900; letter-spacing: .05em; flex: 1; white-space: nowrap; }
        .top-bar button {
            padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer;
            font-family: inherit; font-weight: 700; font-size: 13px; transition: opacity .15s;
        }
        .top-bar button:hover { opacity: .8; }
        .btn-view { background: var(--blue); color: white; }
        .btn-rule { background: #374151; color: #d1d5db; }
        .btn-reset { background: #991b1b; color: white; }
        .btn-adj { background: #374151; color: white; font-size: 18px; padding: 6px 14px; font-family: 'Share Tech Mono', monospace; }
        .adj-group { display: flex; gap: 4px; align-items: center; }
        .player-count-badge {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            color: #9ca3af;
            min-width: 24px;
            text-align: center;
        }
        /* 順位表表示中はプレイヤー増減グループを隠す */
        .adj-group.hidden { display: none; }

        /* ===== NAME SETUP ===== */
        .name-bar {
            background: white;
            border-bottom: 1px solid var(--line);
            padding: 8px 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .name-chip {
            display: flex; align-items: center; gap: 4px;
            background: #f3f4f6; border: 1px solid var(--line); border-radius: 6px; padding: 4px 8px;
            transition: border-color .2s;
        }
        .name-chip:focus-within { border-color: var(--blue); }
        .name-chip .num { font-size: 10px; color: #9ca3af; font-family: 'Share Tech Mono', monospace; }
        .name-chip input {
            border: none; background: transparent; width: 72px; font-size: 13px;
            font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700; color: var(--ink); outline: none;
        }
        /* プレースホルダーを薄く表示 */
        .name-chip input::placeholder {
            color: #d1d5db;
            font-weight: 400;
        }

        /* ===== LEAGUE TABLE ===== */
        .scroll-wrap {
            overflow: auto; -webkit-overflow-scrolling: touch;
            max-height: calc(100vh - 120px);
        }
        #league-table {
            border-collapse: separate; border-spacing: 0;
            table-layout: fixed; min-width: max-content; background: white;
        }
        #league-table th, #league-table td {
            border-right: 1px solid var(--line); border-bottom: 1px solid var(--line);
            width: var(--cell-w); text-align: center; padding: 6px 4px;
        }
        /* Row header */
        #league-table tr td:first-child,
        #league-table tr th:first-child {
            width: var(--header-w);
            position: sticky; left: 0;
            background: white;
            font-size: 11px; font-weight: 700;
            z-index: 5;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            max-width: var(--header-w);
            padding: 4px 6px;
        }
        /* Column header row */
        #league-table thead th {
            position: sticky; top: 0; background: var(--ink); color: white; z-index: 10;
            font-size: 11px; font-weight: 700;
        }
        #league-table thead th:first-child { z-index: 12; background: var(--ink); }

        .diagonal {
            background: repeating-linear-gradient(
                -45deg, #e5e7eb, #e5e7eb 2px, #f3f4f6 2px, #f3f4f6 8px
            );
        }

        /* ===== MATCH CELL ===== */
        .match-cell { display: flex; flex-direction: column; gap: 3px; padding: 2px; }

        /* game score summary */
        .game-summary {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 2px 4px; border-radius: 4px; font-family: 'Share Tech Mono', monospace;
        }
        .gs-num {
            font-size: 22px; font-weight: 900; line-height: 1; min-width: 18px;
        }
        .gs-sep { color: var(--line); font-size: 18px; }
        .gs-win  { color: var(--blue); }
        .gs-lose { color: var(--soft); }
        .gs-lead { color: var(--red); }

        /* status badge */
        .status-badge {
            font-size: 9px; font-weight: 700; letter-spacing: .08em;
            padding: 1px 5px; border-radius: 10px; align-self: center;
        }
        .badge-done  { background: #d1fae5; color: #065f46; }
        .badge-prog  { background: #fef3c7; color: #92400e; }
        .badge-empty { background: #f3f4f6; color: #9ca3af; }

        /* game rows */
        .game-rows { display: flex; flex-direction: column; gap: 1px; }
        .game-row {
            display: flex; align-items: center; gap: 2px; justify-content: center;
            opacity: 1; transition: opacity .2s;
        }
        .game-row.hidden-row { display: none; }
        .game-row input {
            width: var(--input-w); height: 22px; text-align: center;
            font-size: 13px; font-family: 'Share Tech Mono', monospace;
            border: 1px solid var(--line); border-radius: 4px;
            background: white; color: var(--ink);
            transition: border-color .15s;
        }
        .game-row input:focus { border-color: var(--blue); outline: none; }
        .game-row input.winner { background: #eff6ff; font-weight: 700; }
        .game-row input.loser  { background: #fafafa; color: #9ca3af; }
        .game-sep { color: #d1d5db; font-size: 12px; }
        .game-label {
            font-size: 9px; color: #9ca3af; font-family: 'Share Tech Mono', monospace; min-width: 12px;
        }
        /* show "add game" button */
        .add-game-btn {
            font-size: 10px; color: var(--blue); background: none; border: 1px dashed #bfdbfe;
            border-radius: 4px; cursor: pointer; padding: 1px 8px; margin-top: 1px;
            font-family: inherit; transition: background .15s;
            display: none;
        }
        .add-game-btn:hover { background: #eff6ff; }
        .add-game-btn.visible { display: block; }

        /* 勝ちセルのみハイライト */
        .cell-won { background: #f0fdf4; }

        /* スコアエラー */
        .game-row.error-row input { border-color: #e03535 !important; background: #fff1f2 !important; color: #e03535 !important; }
        .score-error-msg { font-size: 9px; color: #e03535; font-weight: 700; text-align: center; margin-top: 1px; }

        /* ===== RANKING ===== */
        #ranking-view { padding: 16px; }
        #ranking-view h2 {
            font-size: 16px; font-weight: 900; margin-bottom: 12px;
            border-left: 4px solid var(--blue); padding-left: 10px;
        }
        #ranking-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
        #ranking-table thead th { background: var(--ink); color: white; padding: 10px 12px; font-size: 12px; text-align: center; }
        #ranking-table td { border-bottom: 1px solid var(--line); padding: 10px 12px; font-size: 14px; text-align: center; }
        #ranking-table tr:last-child td { border-bottom: none; }
        .rank-1 td { background: #fffbeb; }
        .rank-num { font-family: 'Share Tech Mono', monospace; font-weight: 900; font-size: 16px; }
        .rank-name { text-align: left !important; font-weight: 700; }
        .positive { color: var(--blue); }
        .negative { color: var(--red); }

        .hidden { display: none; }

        /* ===== MODAL ===== */
        .modal-bg {
            position: fixed; inset: 0; background: rgba(0,0,0,.6);
            display: none; justify-content: center; align-items: center; z-index: 999;
        }
        .modal-bg.open { display: flex; }
        .modal-box {
            background: white; padding: 24px; border-radius: 14px;
            width: 88%; max-width: 360px; box-shadow: 0 20px 40px rgba(0,0,0,.3);
        }
        .modal-box h3 { font-size: 16px; font-weight: 900; margin-bottom: 12px; }
        .modal-box p { font-size: 13px; line-height: 1.8; color: #374151; }
        .modal-close {
            margin-top: 18px; width: 100%; padding: 11px;
            background: var(--blue); color: white; border: none;
            border-radius: 8px; font-family: inherit; font-weight: 700; font-size: 14px; cursor: pointer;
        }

        /* progress bar */
        .progress-bar-wrap { background: var(--line); height: 3px; }
        .progress-bar { height: 3px; background: var(--blue); transition: width .4s; }
    </style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
    <h1>🏓 卓球部内戦ver.2</h1>
    <button class="btn-view" onclick="toggleView()">表示切替</button>
    <button class="btn-rule" onclick="showModal()">ルール</button>
    <button class="btn-reset" onclick="resetAll()">リセット</button>
    <div class="adj-group" id="adj-group">
        <button class="btn-adj" onclick="adjustPlayers(-1)">－</button>
        <span class="player-count-badge" id="pc-badge">3人</span>
        <button class="btn-adj" onclick="adjustPlayers(1)">＋</button>
    </div>
</div>

<!-- 進捗バー -->
<div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>

<!-- 名前バー -->
<div class="name-bar" id="name-bar"></div>

<!-- リーグ表 -->
<div id="league-view">
    <div class="scroll-wrap">
        <table id="league-table"></table>
    </div>
</div>

<!-- 順位表 -->
<div id="ranking-view" class="hidden">
    <h2>順位表</h2>
    <table id="ranking-table">
        <thead><tr><th>位</th><th style="text-align:left">名前</th><th>点</th><th>G差</th><th>P差</th><th>試合</th></tr></thead>
        <tbody id="ranking-body"></tbody>
    </table>
</div>

<!-- ルールモーダル -->
<div id="rule-modal" class="modal-bg" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3>🏓 ルール</h3>
        <p>
            ・<strong>3ゲーム先取</strong>で勝利<br>
            ・勝利：<strong>2点</strong>　負け：<strong>1点</strong>　棄権：0点<br><br>
            <strong>【順位決定基準】</strong><br>
            1. 勝ち点<br>
            2. 直接対決（同点2者の場合）<br>
            3. 得失ゲーム差<br>
            4. 得失ポイント差
        </p>
        <button class="modal-close" onclick="closeModal()">閉じる</button>
    </div>
</div>

<script>
    const BEST_OF = 5;
    const WIN_GAMES = 3;
    const MAX_PLAYERS = 20;

    let playerCount = 3;
    let players = ["", "", ""];
    let scores = {};
    let visibleGames = {};

    function initScores() {
        scores = {};
        visibleGames = {};
        for (let i = 0; i < MAX_PLAYERS; i++) {
            scores[i] = {}; visibleGames[i] = {};
            for (let j = 0; j < MAX_PLAYERS; j++) {
                scores[i][j] = { games: Array.from({ length: BEST_OF }, () => ({ p1: "", p2: "" })) };
                visibleGames[i][j] = 1;
            }
        }
    }

    function saveData() {
        localStorage.setItem('tt_league_v2', JSON.stringify({ playerCount, players, scores, visibleGames }));
    }
    function loadData() {
        const s = localStorage.getItem('tt_league_v2');
        if (!s) return false;
        try {
            const d = JSON.parse(s);
            playerCount = d.playerCount; players = d.players; scores = d.scores; visibleGames = d.visibleGames;
            return true;
        } catch { return false; }
    }
    function resetAll() {
        if (!confirm("すべてのスコアと名前をリセットしますか？")) return;
        localStorage.removeItem('tt_league_v2');
        playerCount = 3;
        players = ["", "", ""];
        initScores(); renderAll();
    }

    function adjustPlayers(n) {
        if (n > 0 && playerCount < MAX_PLAYERS) {
            playerCount++;
            if (players[playerCount - 1] === undefined) players.push("");
        } else if (n < 0 && playerCount > 2) {
            playerCount--;
        }
        renderAll(); saveData();
    }

    function updateScore(r, c, gameIdx, field, val) {
        const v = val === "" ? "" : parseInt(val);
        if (val !== "" && (isNaN(v) || v < 0)) return;

        scores[r][c].games[gameIdx][field] = v;
        const mirror = field === 'p1' ? 'p2' : 'p1';
        scores[c][r].games[gameIdx][mirror] = v;

        const res = calculateMatch(scores[r][c].games);
        if (res.g1 >= WIN_GAMES || res.g2 >= WIN_GAMES) {
            let needed = res.g1 + res.g2;
            for (let k = needed; k < BEST_OF; k++) {
                scores[r][c].games[k] = { p1: "", p2: "" };
                scores[c][r].games[k] = { p1: "", p2: "" };
            }
            visibleGames[r][c] = needed;
            visibleGames[c][r] = needed;
        } else {
            const filledGames = scores[r][c].games.filter(g => g.p1 !== "" || g.p2 !== "").length;
            const curVis = visibleGames[r][c];
            if (filledGames >= curVis && curVis < BEST_OF) {
                visibleGames[r][c] = Math.min(curVis + 1, BEST_OF);
                visibleGames[c][r] = visibleGames[r][c];
            }
        }

        renderLeague(); saveData();
    }

    function calculateMatch(games) {
        let g1 = 0, g2 = 0, p1T = 0, p2T = 0;
        games.forEach(g => {
            if (g.p1 !== "" && g.p2 !== "" && !isNaN(g.p1) && !isNaN(g.p2)) {
                if (g.p1 > g.p2) g1++; else if (g.p2 > g.p1) g2++;
                p1T += +g.p1; p2T += +g.p2;
            }
        });
        return { g1, g2, p1T, p2T };
    }

    function countFilledGames(games) {
        return games.filter(g => g.p1 !== "" || g.p2 !== "").length;
    }

    function updateProgress() {
        const total = playerCount * (playerCount - 1) / 2;
        let done = 0;
        for (let i = 0; i < playerCount; i++) {
            for (let j = i + 1; j < playerCount; j++) {
                const r = calculateMatch(scores[i][j].games);
                if (r.g1 >= WIN_GAMES || r.g2 >= WIN_GAMES) done++;
            }
        }
        const pct = total === 0 ? 0 : Math.round(done / total * 100);
        document.getElementById('progress-bar').style.width = pct + '%';
    }

    // 表示用の名前（空なら番号で代替）
    function displayName(i) {
        return players[i] && players[i].trim() !== "" ? players[i] : `選手${i + 1}`;
    }

    function renderNameBar() {
        document.getElementById('name-bar').innerHTML = Array.from({ length: playerCount }, (_, i) => `
            <div class="name-chip">
                <span class="num">${i + 1}</span>
                <input type="text" value="${escHtml(players[i] || '')}" placeholder="名前" oninput="updatePlayerName(${i}, this.value)">
            </div>
        `).join('');
        document.getElementById('pc-badge').textContent = playerCount + '人';
    }

    function updatePlayerName(idx, name) {
        players[idx] = name;
        renderLeague(); saveData();
    }

    function renderLeague() {
        const table = document.getElementById('league-table');

        let html = '<thead><tr><th></th>';
        for (let i = 0; i < playerCount; i++) {
            html += `<th>${escHtml(displayName(i))}</th>`;
        }
        html += '</tr></thead><tbody>';

        for (let i = 0; i < playerCount; i++) {
            html += `<tr>`;
            html += `<td style="font-weight:700;font-size:11px">${escHtml(displayName(i))}</td>`;
            for (let j = 0; j < playerCount; j++) {
                if (i === j) {
                    html += '<td class="diagonal"></td>';
                    continue;
                }
                const data = scores[i][j];
                const res = calculateMatch(data.games);
                const filled = countFilledGames(data.games);
                const vis = visibleGames[i][j];

                const matchDone = res.g1 >= WIN_GAMES || res.g2 >= WIN_GAMES;
                const matchStarted = filled > 0;

                let badgeClass = 'badge-empty', badgeLabel = '未';
                if (matchDone) { badgeClass = 'badge-done'; badgeLabel = '済'; }
                else if (matchStarted) { badgeClass = 'badge-prog'; badgeLabel = '中'; }

                const g1Class = res.g1 > res.g2 ? 'gs-lead' : (res.g1 < res.g2 ? 'gs-lose' : 'gs-win');
                const g2Class = res.g2 > res.g1 ? 'gs-lead' : (res.g2 < res.g1 ? 'gs-lose' : 'gs-win');

                let gameRowsHtml = '';
                let hasError = false;
                for (let k = 0; k < BEST_OF; k++) {
                    const g = data.games[k];
                    const hidden = k >= vis ? 'hidden-row' : '';
                    const p1Win = g.p1 !== "" && g.p2 !== "" && +g.p1 > +g.p2;
                    const p2Win = g.p1 !== "" && g.p2 !== "" && +g.p2 > +g.p1;
                    const invalid = !isValidGameScore(g.p1, g.p2);
                    if (invalid) hasError = true;
                    gameRowsHtml += `
                        <div class="game-row ${hidden}${invalid ? ' error-row' : ''}">
                            <span class="game-label">G${k+1}</span>
                            <input type="number" inputmode="numeric" min="0" value="${g.p1}"
                                class="${p1Win ? 'winner' : (p2Win ? 'loser' : '')}"
                                onchange="updateScore(${i},${j},${k},'p1',this.value)">
                            <span class="game-sep">-</span>
                            <input type="number" inputmode="numeric" min="0" value="${g.p2}"
                                class="${p2Win ? 'winner' : (p1Win ? 'loser' : '')}"
                                onchange="updateScore(${i},${j},${k},'p2',this.value)">
                            ${invalid ? '<span style="font-size:10px;color:#e03535">⚠</span>' : ''}
                        </div>`;
                }
                const errorMsg = hasError ? `<div class="score-error-msg">⚠ 2点差必要</div>` : '';

                const canAdd = !matchDone && vis < BEST_OF;
                const addBtn = `<button class="add-game-btn${canAdd ? ' visible' : ''}" onclick="addGame(${i},${j})">＋ゲーム追加</button>`;
                const cellClass = (matchDone && res.g1 >= WIN_GAMES) ? ' class="cell-won"' : '';

                html += `<td${cellClass}>
                    <div class="match-cell">
                        <div style="display:flex;align-items:center;justify-content:space-between;padding:0 2px">
                            <span class="status-badge ${badgeClass}">${badgeLabel}</span>
                            <div class="game-summary">
                                <span class="gs-num ${g1Class}">${res.g1}</span>
                                <span class="gs-sep">:</span>
                                <span class="gs-num ${g2Class}">${res.g2}</span>
                            </div>
                        </div>
                        <div class="game-rows">${gameRowsHtml}</div>
                        ${errorMsg}
                        ${addBtn}
                    </div>
                </td>`;
            }
            html += '</tr>';
        }
        html += '</tbody>';
        table.innerHTML = html;
        updateProgress();
    }

    function isValidGameScore(p1, p2) {
        if (p1 === "" || p2 === "") return true;
        const a = +p1, b = +p2;
        const mx = Math.max(a, b), mn = Math.min(a, b);
        if (mx < 11) return true;
        if (Math.abs(a - b) < 2) return false;
        if (mn < 10 && mx !== 11) return false;
        if (mn >= 10 && Math.abs(a - b) !== 2) return false;
        return true;
    }
    function addGame(i, j) {
        if (visibleGames[i][j] < BEST_OF) {
            visibleGames[i][j]++;
            visibleGames[j][i]++;
            renderLeague(); saveData();
        }
    }

    function renderRanking() {
        let stats = Array.from({ length: playerCount }, (_, i) => {
            let s = { id: i, name: displayName(i), winPoints: 0, gDiff: 0, pDiff: 0, defeated: [], matchCount: 0 };
            for (let j = 0; j < playerCount; j++) {
                if (i === j) continue;
                const m = calculateMatch(scores[i][j].games);
                if (m.g1 >= WIN_GAMES || m.g2 >= WIN_GAMES) {
                    s.matchCount++;
                    if (m.g1 >= WIN_GAMES) { s.winPoints += 2; s.defeated.push(j); }
                    else { s.winPoints += 1; }
                    s.gDiff += (m.g1 - m.g2);
                    s.pDiff += (m.p1T - m.p2T);
                }
            }
            return s;
        });
        stats.sort((a, b) => {
            if (b.winPoints !== a.winPoints) return b.winPoints - a.winPoints;
            const tied = stats.filter(x => x.winPoints === a.winPoints);
            if (tied.length === 2) {
                if (a.defeated.includes(b.id)) return -1;
                if (b.defeated.includes(a.id)) return 1;
            }
            if (b.gDiff !== a.gDiff) return b.gDiff - a.gDiff;
            return b.pDiff - a.pDiff;
        });
        stats.forEach((s, idx) => {
            if (idx === 0) { s.rank = 1; }
            else {
                const prev = stats[idx - 1];
                if (s.winPoints === prev.winPoints && s.gDiff === prev.gDiff && s.pDiff === prev.pDiff) {
                    s.rank = prev.rank;
                } else {
                    s.rank = idx + 1;
                }
            }
        });

        document.getElementById('ranking-body').innerHTML = stats.map((s) => {
            const gd = s.gDiff > 0 ? `<span class="positive">+${s.gDiff}</span>` : (s.gDiff < 0 ? `<span class="negative">${s.gDiff}</span>` : s.gDiff);
            const pd = s.pDiff > 0 ? `<span class="positive">+${s.pDiff}</span>` : (s.pDiff < 0 ? `<span class="negative">${s.pDiff}</span>` : s.pDiff);
            return `<tr class="${s.rank === 1 ? 'rank-1' : ''}">
                <td><span class="rank-num">${s.rank}</span></td>
                <td class="rank-name">${escHtml(s.name)}</td>
                <td><strong>${s.winPoints}</strong></td>
                <td>${gd}</td>
                <td>${pd}</td>
                <td>${s.matchCount}</td>
            </tr>`;
        }).join('');
    }

    function toggleView() {
        const lv = document.getElementById('league-view');
        const rv = document.getElementById('ranking-view');
        const nb = document.getElementById('name-bar');
        const adj = document.getElementById('adj-group');
        if (lv.classList.contains('hidden')) {
            // リーグ表に戻る
            lv.classList.remove('hidden');
            nb.classList.remove('hidden');
            rv.classList.add('hidden');
            adj.classList.remove('hidden'); // ±ボタン表示
        } else {
            // 順位表へ
            lv.classList.add('hidden');
            nb.classList.add('hidden');
            rv.classList.remove('hidden');
            adj.classList.add('hidden'); // ±ボタン非表示
            renderRanking();
        }
    }

    function showModal() { document.getElementById('rule-modal').classList.add('open'); }
    function closeModal() { document.getElementById('rule-modal').classList.remove('open'); }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderAll() { renderNameBar(); renderLeague(); }

    if (!loadData()) initScores();
    // 既存データの名前が「名前N」形式なら空文字に変換（移行対応）
    players = players.map((p, i) => (p === `名前${i+1}` ? "" : p));
    renderAll();
</script>

</body>
</html>
